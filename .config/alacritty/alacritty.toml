general.import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

[window]
padding = {x = 25, y = 25}
decorations = "None"

[font]
size = 11

[font.normal]
family = "JetBrainsMonoNL Nerd Font"
style = "SemiBold"

[font.bold]
style = "Bold"

[font.bold_italic]
style = "Bold Italic"

[font.italic]
style = "Italic"

[cursor.style]
shape = "Beam"
